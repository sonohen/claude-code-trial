<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿を編集 - 匿名掲示板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #4a6fa5;
      color: #fff;
      padding: 16px 24px;
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    main {
      max-width: 720px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .edit-form {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .edit-form h2 {
      font-size: 1rem;
      margin-bottom: 16px;
      color: #4a6fa5;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: #555;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #4a6fa5;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
    }

    .btn-save {
      background: #4a6fa5;
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-save:hover { background: #3a5f95; }

    .btn-cancel {
      background: #eee;
      color: #555;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: background 0.2s;
    }

    .btn-cancel:hover { background: #ddd; }
  </style>
</head>
<body>

<header>匿名掲示板</header>

<main>
  <div class="edit-form">
    <h2>投稿を編集</h2>
    <form action="/edit/{{ msg.id }}" method="post">
      <div class="form-group">
        <label for="name">名前（最大50文字）</label>
        <input type="text" id="name" name="name" maxlength="50" value="{{ msg.name }}" required>
      </div>
      <div class="form-group">
        <label for="message">メッセージ（最大1000文字）</label>
        <textarea id="message" name="message" maxlength="1000" required>{{ msg.message }}</textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-save">保存する</button>
        <a href="/" class="btn-cancel">キャンセル</a>
      </div>
    </form>
  </div>
</main>

</body>
</html>
